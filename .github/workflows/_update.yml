name: _reuse.update

on:
  workflow_call:
    inputs:
      check:
        type: boolean
        required: true
        description: If should do the check part
      squash_history:
        type: boolean
        required: false
        default: true
        description: SQUASH_HISTORY option for the branch push

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-:

      - name: Pull previous meta
        uses: actions/checkout@v4
        with:
          ref: meta
          path: meta

      - name: Prepare runtime
        run: |
          rm -rf ./meta/.git
          cd ./scripts
          pip install -r requirements.txt

      - name: Detect changed plugins
        id: detect-changes
        if: inputs.check
        run: |
          if git rev-parse --verify HEAD~1 > /dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- plugins/ | sed -n 's|^plugins/\([^/]*\)/.*|\1|p' | sort -u | tr '\n' ',')
            CHANGED="${CHANGED%,}"
          else
            CHANGED=""
          fi
          echo "plugins=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed plugins: ${CHANGED:-none}"

      - name: Do the update
        # Strict check (fail_hard) runs only for plugins changed in this commit.
        # All plugins are always updated with fallback behavior (--no-check).
        run: |
          cd ./scripts
          if [ "${{ inputs.check }}" = "true" ] && [ -n "${{ steps.detect-changes.outputs.plugins }}" ]; then
            python main.py check --targets "${{ steps.detect-changes.outputs.plugins }}"
          fi
          if [ "${{ inputs.check }}" = "true" ]; then
            python main.py all --no-check
          else
            python main.py all --no-check --auto-disable-failures
          fi
        env:
          github_api_token: ${{ secrets.TOKEN_FOR_GITHUB_API }}

      - name: Auto commit disabled plugins
        if: ${{ !inputs.check }}
        run: |
          if git diff --quiet -- plugins/; then
            echo "No plugin changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/
          git commit -m "chore: auto disable failed plugins"
          git push

      - name: Deploy meta
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: meta
          FOLDER: meta
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SQUASH_HISTORY: ${{ inputs.squash_history }}
          SKIP_EMPTY_COMMITS: true

      - name: Deploy doc
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: catalogue
          FOLDER: catalogue
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SQUASH_HISTORY: ${{ inputs.squash_history }}
          SKIP_EMPTY_COMMITS: true
