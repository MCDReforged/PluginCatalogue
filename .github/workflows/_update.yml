name: _reuse.update

on:
  workflow_call:
    inputs:
      check:
        type: boolean
        required: true
        description: If should do the check part
      squash_history:
        type: boolean
        required: false
        default: true
        description: SQUASH_HISTORY option for the branch push

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-:

      - name: Pull previous meta
        uses: actions/checkout@v4
        with:
          ref: meta
          path: meta

      - name: Prepare runtime
        run: |
          rm -rf ./meta/.git
          cd ./scripts
          pip install -r requirements.txt

      - name: Do the update
        run: |
          cd ./scripts
          if [ "${{ inputs.check }}" = "true" ]; then
            python main.py check
          fi
          if [ "${{ inputs.check }}" = "false" ]; then
            python main.py all --no-check --auto-disable-failures
          else
            python main.py all --no-check
          fi
        env:
          github_api_token: ${{ secrets.TOKEN_FOR_GITHUB_API }}

      - name: Auto commit disabled plugins
        if: ${{ !inputs.check }}
        run: |
          CHANGED_FILES=$(git diff --name-only -- 'plugins/*/plugin_info.json')
          if [ -z "$CHANGED_FILES" ]; then
            echo "No plugin_info.json changes to commit"
            exit 0
          fi
          PLUGIN_IDS=$(printf '%s\n' "$CHANGED_FILES" | sed -n 's|^plugins/\([^/]*\)/plugin_info.json$|\1|p' | sort -u | tr '\n' ',' | sed 's/,$//')
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          while IFS= read -r changed_file; do
            git add -- "$changed_file"
          done <<EOF
          $CHANGED_FILES
          EOF
          git commit -m "chore: auto disable failed plugins (${PLUGIN_IDS})"
          git push

      - name: Deploy meta
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: meta
          FOLDER: meta
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SQUASH_HISTORY: ${{ inputs.squash_history }}
          SKIP_EMPTY_COMMITS: true

      - name: Deploy doc
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: catalogue
          FOLDER: catalogue
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SQUASH_HISTORY: ${{ inputs.squash_history }}
          SKIP_EMPTY_COMMITS: true
