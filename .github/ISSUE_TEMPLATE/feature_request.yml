name: Feature request (功能建议)
description: Suggest a new feature or improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please provide complete information.
        请尽量提供完整信息。
  - type: input
    id: summary
    attributes:
      label: Summary (需求概述)
      description: Briefly describe the feature request.
      placeholder: 简要描述功能建议
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation (问题或动机)
      description: What problem would this solve?
      placeholder: 说明这个建议要解决什么问题
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (建议方案)
      description: Describe the feature or improvement you would like.
      placeholder: 描述你希望的功能或改进方案
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Additional details (补充信息)
      description: Add examples, alternatives, mockups, or related links if helpful.
      placeholder: 如有必要，可补充示例、替代方案、草图或相关链接等
    validations:
      required: false
  - type: checkboxes
    id: confirm
    attributes:
      label: 我已检查现有 issue，且理解功能建议可能不被采纳。
      options:
        - label: I've checked existing issues and acknowledge that feature requests might be declined.
          required: true
