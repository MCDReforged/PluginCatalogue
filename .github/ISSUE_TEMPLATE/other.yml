name: 其他问题
description: 反馈不属于“举报插件”或“网站问题”的其他事项
title: "[其他问题] "
body:
  - type: markdown
    attributes:
      value: |
        若问题与插件仓库网站有关，请改到：https://github.com/MCDReforged/website/issues/
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 请简要描述你遇到的问题或建议
      placeholder: 请描述问题
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: 补充信息
      description: 可补充上下文、截图、日志或相关链接
      placeholder: 可选
    validations:
      required: false
